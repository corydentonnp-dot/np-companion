{% extends "base.html" %}
{% block title %}Refill Calculator — CareCompanion{% endblock %}
{% block page_id %}cs-calculator{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-header__title">Refill Date Calculator</h1>
    <div class="page-header__actions">
        <a href="/cs-tracker" class="btn btn-outline btn-sm">Back to CS Tracker</a>
    </div>
</div>

<div class="card" style="max-width:480px;">
    <div class="card-header">Calculate Earliest Refill Date</div>
    <div class="card-body">
        <div class="form-group">
            <label class="form-label">Last Fill Date</label>
            <input type="date" id="calc-fill-date" class="form-input" onchange="calcRefill()">
        </div>
        <div class="form-group">
            <label class="form-label">Days Supply</label>
            <input type="number" id="calc-days" class="form-input" value="30" onchange="calcRefill()">
        </div>
        <div id="calc-result" style="margin-top:16px;padding:16px;background:var(--bg-muted,#f8fafc);border-radius:8px;display:none;">
            <div style="font-size:14px;color:var(--text-secondary);margin-bottom:4px;">Earliest Refill Date:</div>
            <div id="calc-date" style="font-size:24px;font-weight:700;color:var(--color-teal,#0D7377);"></div>
            <div id="calc-days-until" style="font-size:13px;color:var(--text-secondary);margin-top:4px;"></div>
        </div>
    </div>
</div>

<script>
function calcRefill() {
    var fillDate = document.getElementById('calc-fill-date').value;
    var days = parseInt(document.getElementById('calc-days').value) || 0;
    var result = document.getElementById('calc-result');
    if (!fillDate || !days) { result.style.display = 'none'; return; }
    var d = new Date(fillDate + 'T00:00:00');
    d.setDate(d.getDate() + days);
    var refill = d.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.ceil((d - today) / (1000*60*60*24));
    document.getElementById('calc-date').textContent = refill;
    document.getElementById('calc-days-until').textContent = diff > 0 ? diff + ' days from today' : diff === 0 ? 'Today' : Math.abs(diff) + ' days ago';
    result.style.display = 'block';
}
</script>
{% endblock %}
