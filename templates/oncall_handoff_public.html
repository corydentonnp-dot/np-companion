<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On-Call Handoff — NP Companion</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1e293b; }
        h1 { font-size: 20px; }
        .note { font-size: 13px; color: #64748b; margin-bottom: 20px; }
        .card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .row { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; }
        .row:last-child { border-bottom: none; }
        .time { font-size: 12px; color: #64748b; min-width: 80px; }
        .complaint { flex: 1; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .badge-pending { background: #fee2e2; color: #dc2626; }
        .badge-done { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <h1>On-Call Handoff</h1>
    <p class="note">De-identified summary — no patient identifiers. This link is read-only and will expire.</p>

    {% if summary %}
    <div class="card">
        {% for item in summary %}
        <div class="row">
            <span class="time">{{ item.call_time }}</span>
            <span class="complaint">{{ item.chief_complaint }}</span>
            <span class="badge {{ 'badge-pending' if item.status == 'pending' else 'badge-done' }}">{{ item.status }}</span>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p style="text-align:center;color:#64748b;padding:40px 0;">No calls in this handoff period.</p>
    {% endif %}
</body>
</html>
